---
# Shared variables used across playbooks.
# Override any of these at runtime: -e variable_name=value

# Binary install location (nvim, zellij, etc.)
cmdr_bin_dir: /usr/local/bin

# Dotfiles repository URL
dotfiles_repo: "https://github.com/CameronCandau/dotfiles"

# WezTerm AppImage version to install
# Update this when a new release is available
wezterm_version: "20240203-110809-5046fc22"

# OSCP repos clone location
oscp_dir: "{{ ansible_facts['env']['HOME'] }}/projects/personal/oscp"

# Rust / cargo defaults
rustup_home: "{{ ansible_facts['env']['HOME'] }}/.cargo"
cargo_bin_dir: "{{ rustup_home }}/bin"
rustup_toolchain: stable
rustup_profile: minimal

# Published pentest tooling defaults
payloads_dir: "{{ ansible_facts['env']['HOME'] }}/tools/payloads"
artifact_locker_data_dir: "{{ ansible_facts['env']['HOME'] }}/.local/share/artifact-locker"
artifact_locker_oci_repository: "public.ecr.aws/o7l3z5i2/artifact-locker"
