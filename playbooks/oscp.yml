---
# OSCP Lab Tooling
# Installs and configures the full OSCP workflow stack on Kali or Debian.
#
# What this installs:
#   - OSCP baseline    (recon, web enum, cracking, AD, file transfer tools)
#   - direnv           (auto-export $IP/$TARGET_NAME on cd into target dirs)
#   - tmux             (plain terminal multiplexing, no plugins required)
#   - OSCP-Methodology (command reference markdown files)
#   - OSCP-Automation  (workspace init scripts, scan automation)
#   - artifact-locker   (pipx-installed OCI catalog CLI plus managed repo config)
#   - payload-server    (pipx-installed payload transfer helper)
#   - opindex           (pipx-installed command-note indexer)
#   - payload folders   (flat linux/windows payload staging tree)
#   - penelope         (shell handler via pipx, plus ~/tools/penelope.py fallback)
#   - pentest-check    (quick command availability smoke test)
#
# Usage:
#   ansible-playbook playbooks/oscp.yml -K
#
- name: OSCP Lab Tooling
  hosts: all
  vars:
    tools_dir: "{{ ansible_facts['env']['HOME'] }}/tools"
    local_bin_dir: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
    oras_version: "1.3.2"
    oras_arch_map:
      x86_64: amd64
      amd64: amd64
      aarch64: arm64
      arm64: arm64
    oras_arch: "{{ oras_arch_map[ansible_facts['architecture']] | default(ansible_facts['architecture']) }}"
    oscp_repos:
      - name: OSCP-Methodology
        repo: "https://github.com/CameronCandau/OSCP-Methodology.git"
      - name: OSCP-Automation
        repo: "https://github.com/CameronCandau/OSCP-Automation.git"
    oscp_core_packages:
      - direnv
      - tmux
      - xclip
      - wl-clipboard
      - nmap
      - curl
      - wget
      - unzip
      - zip
      - jq
      - git
      - make
      - tree
      - python3
      - python3-pip
      - python3-venv
      - pipx
      - netcat-openbsd
      - socat
      - rlwrap
      - proxychains4
      - ldap-utils
      - smbclient
      - samba-common-bin
    oscp_optional_packages:
      - exploitdb
      - seclists
      - wordlists
      - autorecon
      - ffuf
      - feroxbuster
      - gobuster
      - nikto
      - whatweb
      - hydra
      - john
      - hashcat
      - cewl
      - impacket-scripts
      - evil-winrm
      - netexec
      - crackmapexec
      - responder
      - kerbrute
      - chisel
      - ligolo-ng
      - remmina
      - freerdp3-x11
      - freerdp2-x11

  tasks:
    # ── Directories ────────────────────────────────────────────────────────
    - name: Ensure project directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ oscp_dir }}"
        - "{{ tools_dir }}"
        - "{{ payloads_dir }}"
        - "{{ payloads_dir }}/linux"
        - "{{ payloads_dir }}/windows"
        - "{{ local_bin_dir }}"
        - "{{ ansible_facts['env']['HOME'] }}/logs"
        - "{{ ansible_facts['env']['HOME'] }}/.cache"
        - "{{ artifact_locker_data_dir }}"

    - name: Check whether legacy payload subdirectories still contain files
      command: "find {{ item }} -mindepth 1 -print -quit"
      register: legacy_payload_dir_contents
      changed_when: false
      failed_when: false
      loop:
        - "{{ payloads_dir }}/windows/bin"
        - "{{ payloads_dir }}/windows/scripts"
        - "{{ payloads_dir }}/windows/webshells"

    - name: Remove empty legacy payload subdirectories
      file:
        path: "{{ item.item }}"
        state: absent
      loop: "{{ legacy_payload_dir_contents.results }}"
      when:
        - item.rc == 0
        - item.stdout == ""

    - name: Warn about non-empty legacy payload subdirectories
      debug:
        msg: >-
          Legacy payload directory {{ item.item }} still has content and was left in place.
          Flatten or rename those files into {{ payloads_dir }}/windows/ if you want a fully
          flat local payload tree.
      loop: "{{ legacy_payload_dir_contents.results }}"
      when:
        - item.rc == 0
        - item.stdout != ""

    # ── System packages ────────────────────────────────────────────────────
    - name: Update apt cache for OSCP packages
      become: true
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install core OSCP tooling packages
      become: true
      apt:
        name: "{{ oscp_core_packages }}"
        state: present

    - name: Check optional OSCP package availability
      command: "apt-cache show {{ item }}"
      loop: "{{ oscp_optional_packages }}"
      register: oscp_optional_package_checks
      changed_when: false
      failed_when: false

    - name: Install optional OSCP packages available in APT
      become: true
      apt:
        name: "{{ item.item }}"
        state: present
      loop: "{{ oscp_optional_package_checks.results }}"
      when: item.rc == 0

    - name: Show optional OSCP packages not found in configured APT repos
      debug:
        msg: "Optional OSCP package not available from APT: {{ item.item }}"
      loop: "{{ oscp_optional_package_checks.results }}"
      when: item.rc != 0

    - name: Install updog HTTP file server with pipx
      command: pipx install updog
      args:
        creates: "{{ local_bin_dir }}/updog"
      register: updog_pipx_install
      changed_when: updog_pipx_install.rc == 0
      failed_when: false

    - name: Show updog install warning
      debug:
        msg: "updog was not installed with pipx; payload-server will use its built-in fuzzy HTTP server."
      when: updog_pipx_install.rc is defined and updog_pipx_install.rc != 0

    - name: Install Penelope shell handler with pipx
      command: pipx install penelope-shell-handler
      args:
        creates: "{{ local_bin_dir }}/penelope"
      register: penelope_pipx_install
      changed_when: penelope_pipx_install.rc == 0
      failed_when: false

    - name: Show Penelope install warning
      debug:
        msg: "Penelope was not installed with pipx; the playbook will keep ~/tools/penelope.py as a fallback."
      when: penelope_pipx_install.rc is defined and penelope_pipx_install.rc != 0

    - name: Check whether payload-server is already installed with pipx
      stat:
        path: "{{ local_bin_dir }}/payload-server"
      register: payload_server_exists

    - name: Install payload-server with pipx
      command: pipx install payload-server
      when: not payload_server_exists.stat.exists

    - name: Upgrade payload-server with pipx
      command: pipx upgrade payload-server
      register: payload_server_upgrade
      changed_when: "'upgraded package' in payload_server_upgrade.stdout or 'upgraded package' in payload_server_upgrade.stderr"
      when: payload_server_exists.stat.exists

    - name: Check whether opindex is already installed with pipx
      stat:
        path: "{{ local_bin_dir }}/opindex"
      register: opindex_exists

    - name: Install opindex with pipx
      command: pipx install opindex
      when: not opindex_exists.stat.exists

    - name: Upgrade opindex with pipx
      command: pipx upgrade opindex
      register: opindex_upgrade
      changed_when: "'upgraded package' in opindex_upgrade.stdout or 'upgraded package' in opindex_upgrade.stderr"
      when: opindex_exists.stat.exists

    - name: Check whether artifact-locker is already installed with pipx
      stat:
        path: "{{ local_bin_dir }}/artifact-locker"
      register: artifact_locker_exists

    - name: Install artifact-locker with pipx
      command: pipx install artifact-locker
      when: not artifact_locker_exists.stat.exists

    - name: Upgrade artifact-locker with pipx
      command: pipx upgrade artifact-locker
      register: artifact_locker_upgrade
      changed_when: "'upgraded package' in artifact_locker_upgrade.stdout or 'upgraded package' in artifact_locker_upgrade.stderr"
      when: artifact_locker_exists.stat.exists

    - name: Initialize artifact-locker managed repo
      command: "{{ local_bin_dir }}/artifact-locker init"

    - name: Write artifact-locker managed repo config
      copy:
        dest: "{{ artifact_locker_data_dir }}/config.json"
        mode: '0644'
        content: |
          {
            "local_artifact_dir": "{{ payloads_dir }}",
            "oci_repository": "{{ artifact_locker_oci_repository }}"
          }

    - name: Seed artifact-locker data repo README
      copy:
        dest: "{{ artifact_locker_data_dir }}/README.md"
        mode: '0644'
        force: false
        content: |
          # artifact-locker

          Local manifests, checksums, staged release assets, and pull state for `artifact-locker`.

          This directory is local user state. The published artifacts live in OCI, so you do
          not need a separate artifact Git repository for the default workflow.

          Ansible configures `config.json` here to use `~/tools/payloads` as the local artifact
          directory and `public.ecr.aws/o7l3z5i2/artifact-locker` as the OCI repository.

    - name: Check for oras
      stat:
        path: "{{ local_bin_dir }}/oras"
      register: oras_exists

    - name: Download ORAS release archive
      get_url:
        url: "https://github.com/oras-project/oras/releases/download/v{{ oras_version }}/oras_{{ oras_version }}_linux_{{ oras_arch }}.tar.gz"
        dest: "{{ ansible_facts['env']['HOME'] }}/.cache/oras_{{ oras_version }}_linux_{{ oras_arch }}.tar.gz"
        mode: '0644'
      when: not oras_exists.stat.exists

    - name: Ensure ORAS unpack directory exists
      file:
        path: "{{ ansible_facts['env']['HOME'] }}/.cache/oras-{{ oras_version }}"
        state: directory
        mode: '0755'
      when: not oras_exists.stat.exists

    - name: Expand ORAS release archive
      unarchive:
        src: "{{ ansible_facts['env']['HOME'] }}/.cache/oras_{{ oras_version }}_linux_{{ oras_arch }}.tar.gz"
        dest: "{{ ansible_facts['env']['HOME'] }}/.cache/oras-{{ oras_version }}"
        remote_src: true
      when: not oras_exists.stat.exists

    - name: Install ORAS binary
      copy:
        src: "{{ ansible_facts['env']['HOME'] }}/.cache/oras-{{ oras_version }}/oras"
        dest: "{{ local_bin_dir }}/oras"
        mode: '0755'
        remote_src: true
      when: not oras_exists.stat.exists

    # ── Clone repos ────────────────────────────────────────────────────────
    - name: Clone or update OSCP repos
      git:
        repo: "{{ item.repo }}"
        dest: "{{ oscp_dir }}/{{ item.name }}"
        update: true
      loop: "{{ oscp_repos }}"

    # ── Install OSCP-Automation scripts ────────────────────────────────────
    - name: Install OSCP-Automation shell helpers via make
      command:
        cmd: make install PREFIX="{{ ansible_facts['env']['HOME'] }}/.local"
        chdir: "{{ oscp_dir }}/OSCP-Automation"

    - name: Populate payload cache with artifact-locker pull
      command: "{{ local_bin_dir }}/artifact-locker pull"
      environment:
        PATH: "{{ local_bin_dir }}:{{ ansible_facts['env']['PATH'] }}"

    - name: Check payload-server state file
      stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.local/state/payload-server/state.json"
      register: payload_server_state

    - name: Check payload-server status
      command: "{{ local_bin_dir }}/payload-server status"
      environment:
        PATH: "{{ local_bin_dir }}:{{ ansible_facts['env']['PATH'] }}"
      register: payload_server_status
      changed_when: false
      when: payload_server_state.stat.exists

    - name: Note missing payload-server state
      debug:
        msg: "payload-server not started yet; state file missing, so status check skipped."
      when: not payload_server_state.stat.exists

    - name: Show payload-server status
      debug:
        var: payload_server_status.stdout_lines
      when: payload_server_state.stat.exists

    # ── Shell config (bash/zsh) ────────────────────────────────────────────
    - name: Add ~/.local/bin to .profile PATH
      lineinfile:
        path: "{{ ansible_facts['env']['HOME'] }}/.profile"
        create: true
        mode: '0644'
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        regexp: '^\s*export PATH="\$HOME/\.local/bin:\$PATH"$'
        state: present

    - name: Add ~/.local/bin to .zprofile PATH
      lineinfile:
        path: "{{ ansible_facts['env']['HOME'] }}/.zprofile"
        create: true
        mode: '0644'
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        regexp: '^\s*export PATH="\$HOME/\.local/bin:\$PATH"$'
        state: present

    - name: Add ~/.local/bin to .bashrc PATH
      lineinfile:
        path: "{{ ansible_facts['env']['HOME'] }}/.bashrc"
        create: true
        mode: '0644'
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        regexp: '^\s*export PATH="\$HOME/\.local/bin:\$PATH"$'
        state: present

    - name: Add direnv hook to .bashrc
      lineinfile:
        path: "{{ ansible_facts['env']['HOME'] }}/.bashrc"
        create: true
        mode: '0644'
        line: 'eval "$(direnv hook bash)"'
        regexp: 'direnv hook bash'
        state: present

    - name: Add bash history tuning
      blockinfile:
        path: "{{ ansible_facts['env']['HOME'] }}/.bashrc"
        create: true
        mode: '0644'
        marker: "# {mark} ANSIBLE MANAGED BASH HISTORY"
        block: |
          HISTSIZE=50000
          HISTFILESIZE=100000
          HISTCONTROL=ignoreboth:erasedups
          PROMPT_COMMAND='history -a; history -n'

    - name: Add ~/.local/bin to .zshrc PATH
      lineinfile:
        path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
        create: true
        mode: '0644'
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        regexp: '^\s*export PATH="\$HOME/\.local/bin:\$PATH"$'
        state: present

    - name: Add direnv hook to .zshrc
      lineinfile:
        path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
        create: true
        mode: '0644'
        line: 'eval "$(direnv hook zsh)"'
        regexp: 'direnv hook zsh'
        state: present

    - name: Add zsh history tuning
      blockinfile:
        path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
        create: true
        mode: '0644'
        marker: "# {mark} ANSIBLE MANAGED ZSH HISTORY"
        block: |
          HISTFILE="$HOME/.zsh_history"
          HISTSIZE=50000
          SAVEHIST=50000
          setopt append_history
          setopt inc_append_history
          setopt hist_ignore_dups
          setopt hist_ignore_space
          setopt hist_find_no_dups

    # ── Penelope shell handler ─────────────────────────────────────────────
    - name: Download penelope.py
      get_url:
        url: "https://raw.githubusercontent.com/brightio/penelope/main/penelope.py"
        dest: "{{ tools_dir }}/penelope.py"
        mode: '0755'
        force: false

    - name: Link penelope.py fallback into local bin
      file:
        src: "{{ tools_dir }}/penelope.py"
        dest: "{{ local_bin_dir }}/penelope.py"
        state: link

    # ── Smoke test helper ──────────────────────────────────────────────────
    - name: Install pentest-check command
      copy:
        dest: "{{ local_bin_dir }}/pentest-check"
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          set -u

          missing=0

          check() {
            local cmd="$1"
            if command -v "$cmd" >/dev/null 2>&1; then
              printf '[ok]      %s\n' "$cmd"
            else
              printf '[missing] %s\n' "$cmd"
              missing=1
            fi
          }

          check_any() {
            local label="$1"
            shift
            local candidate
            for candidate in "$@"; do
              if command -v "$candidate" >/dev/null 2>&1; then
                printf '[ok]      %s (%s)\n' "$label" "$candidate"
                return 0
              fi
            done
            printf '[missing] %s\n' "$label"
            missing=1
          }

          echo 'Pentest command smoke test'
          echo

          check nmap
          check autorecon
          check ffuf
          check feroxbuster
          check gobuster
          check searchsploit
          check netexec
          check evil-winrm
          check ldapsearch
          check smbclient
          check hydra
          check john
          check hashcat
          check socat
          check proxychains4
          check tmux
          check direnv
          check artifact-locker
          check opindex
          check new-target
          check scan
          check parse-ports
          check payload-server
          check responder
          check remmina
          check_any penelope penelope penelope.py
          check_any GetNPUsers GetNPUsers.py impacket-GetNPUsers
          check_any secretsdump secretsdump.py impacket-secretsdump
          check_any psexec psexec.py impacket-psexec

          echo
          if [ "$missing" -eq 0 ]; then
            echo '[+] Pentest tooling baseline looks ready.'
          else
            echo '[!] Some tools are missing. Install them before relying on this machine for timed practice.'
          fi

          exit "$missing"

    - name: Run pentest command smoke test
      command: "{{ local_bin_dir }}/pentest-check"
      environment:
        PATH: "{{ local_bin_dir }}:{{ ansible_facts['env']['PATH'] }}"
      register: pentest_check
      changed_when: false
      failed_when: false

    - name: Show pentest command smoke test output
      debug:
        var: pentest_check.stdout_lines
