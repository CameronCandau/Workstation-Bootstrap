---
# OSCP Lab Tooling
# Installs and configures the full OSCP workflow stack on Kali or Debian.
#
# What this installs:
#   - OSCP baseline    (recon, web enum, cracking, AD, file transfer tools)
#   - direnv           (auto-export $IP/$TARGET_NAME on cd into target dirs)
#   - tmux             (plain terminal multiplexing, no plugins required)
#   - OSCP-Methodology (command reference markdown files)
#   - OSCP-Automation  (workspace init scripts, scan automation)
#   - payload folders   (generic linux/windows payload staging tree)
#   - penelope         (shell handler via pipx, plus ~/tools/penelope.py fallback)
#   - pentest-check    (quick command availability smoke test)
#
# Usage:
#   ansible-playbook playbooks/oscp.yml -K
#
- name: OSCP Lab Tooling
  hosts: all
  vars:
    tools_dir: "{{ ansible_facts['env']['HOME'] }}/tools"
    local_bin_dir: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
    oscp_repos:
      - name: OSCP-Methodology
        repo: "https://github.com/CameronCandau/OSCP-Methodology.git"
      - name: OSCP-Automation
        repo: "https://github.com/CameronCandau/OSCP-Automation.git"
    oscp_core_packages:
      - direnv
      - tmux
      - xclip
      - wl-clipboard
      - nmap
      - curl
      - wget
      - unzip
      - zip
      - jq
      - git
      - make
      - tree
      - python3
      - python3-pip
      - python3-venv
      - pipx
      - netcat-openbsd
      - socat
      - rlwrap
      - proxychains4
      - ldap-utils
      - smbclient
      - samba-common-bin
    oscp_optional_packages:
      - exploitdb
      - seclists
      - wordlists
      - autorecon
      - ffuf
      - feroxbuster
      - gobuster
      - nikto
      - whatweb
      - hydra
      - john
      - hashcat
      - cewl
      - impacket-scripts
      - evil-winrm
      - netexec
      - crackmapexec
      - responder
      - kerbrute
      - chisel
      - ligolo-ng
      - remmina
      - freerdp3-x11
      - freerdp2-x11

  tasks:
    # ── Directories ────────────────────────────────────────────────────────
    - name: Ensure project directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ oscp_dir }}"
        - "{{ tools_dir }}"
        - "{{ tools_dir }}/payloads"
        - "{{ tools_dir }}/payloads/linux"
        - "{{ tools_dir }}/payloads/windows"
        - "{{ tools_dir }}/payloads/windows/bin"
        - "{{ tools_dir }}/payloads/windows/scripts"
        - "{{ tools_dir }}/payloads/windows/webshells"
        - "{{ local_bin_dir }}"
        - "{{ ansible_facts['env']['HOME'] }}/logs"

    # ── System packages ────────────────────────────────────────────────────
    - name: Update apt cache for OSCP packages
      become: true
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install core OSCP tooling packages
      become: true
      apt:
        name: "{{ oscp_core_packages }}"
        state: present

    - name: Check optional OSCP package availability
      command: "apt-cache show {{ item }}"
      loop: "{{ oscp_optional_packages }}"
      register: oscp_optional_package_checks
      changed_when: false
      failed_when: false

    - name: Install optional OSCP packages available in APT
      become: true
      apt:
        name: "{{ item.item }}"
        state: present
      loop: "{{ oscp_optional_package_checks.results }}"
      when: item.rc == 0

    - name: Show optional OSCP packages not found in configured APT repos
      debug:
        msg: "Optional OSCP package not available from APT: {{ item.item }}"
      loop: "{{ oscp_optional_package_checks.results }}"
      when: item.rc != 0

    - name: Install updog HTTP file server with pipx
      command: pipx install updog
      args:
        creates: "{{ local_bin_dir }}/updog"
      register: updog_pipx_install
      changed_when: updog_pipx_install.rc == 0
      failed_when: false

    - name: Show updog install warning
      debug:
        msg: "updog was not installed with pipx; payload-server will use its built-in fuzzy HTTP server."
      when: updog_pipx_install.rc is defined and updog_pipx_install.rc != 0

    - name: Install Penelope shell handler with pipx
      command: pipx install penelope-shell-handler
      args:
        creates: "{{ local_bin_dir }}/penelope"
      register: penelope_pipx_install
      changed_when: penelope_pipx_install.rc == 0
      failed_when: false

    - name: Show Penelope install warning
      debug:
        msg: "Penelope was not installed with pipx; the playbook will keep ~/tools/penelope.py as a fallback."
      when: penelope_pipx_install.rc is defined and penelope_pipx_install.rc != 0

    # ── Clone repos ────────────────────────────────────────────────────────
    - name: Clone or update OSCP repos
      git:
        repo: "{{ item.repo }}"
        dest: "{{ oscp_dir }}/{{ item.name }}"
        update: true
      loop: "{{ oscp_repos }}"

    # ── Install OSCP-Automation scripts ────────────────────────────────────
    - name: Install OSCP-Automation scripts via make
      command:
        cmd: make install PREFIX="{{ ansible_facts['env']['HOME'] }}/.local"
        chdir: "{{ oscp_dir }}/OSCP-Automation"

    # ── Shell config (.bashrc) ─────────────────────────────────────────────
    - name: Add direnv hook to .bashrc
      lineinfile:
        path: "{{ ansible_facts['env']['HOME'] }}/.bashrc"
        line: 'eval "$(direnv hook bash)"'
        regexp: 'direnv hook bash'
        state: present

    # ── Penelope shell handler ─────────────────────────────────────────────
    - name: Download penelope.py
      get_url:
        url: "https://raw.githubusercontent.com/brightio/penelope/main/penelope.py"
        dest: "{{ tools_dir }}/penelope.py"
        mode: '0755'
        force: false

    - name: Link penelope.py fallback into local bin
      file:
        src: "{{ tools_dir }}/penelope.py"
        dest: "{{ local_bin_dir }}/penelope.py"
        state: link

    # ── Smoke test helper ──────────────────────────────────────────────────
    - name: Remove old smoke test command names
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ local_bin_dir }}/oscp-doctor"
        - "{{ local_bin_dir }}/pentest-doctor"

    - name: Install pentest-check command
      copy:
        dest: "{{ local_bin_dir }}/pentest-check"
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          set -u

          missing=0

          check() {
            local cmd="$1"
            if command -v "$cmd" >/dev/null 2>&1; then
              printf '[ok]      %s\n' "$cmd"
            else
              printf '[missing] %s\n' "$cmd"
              missing=1
            fi
          }

          check_any() {
            local label="$1"
            shift
            local candidate
            for candidate in "$@"; do
              if command -v "$candidate" >/dev/null 2>&1; then
                printf '[ok]      %s (%s)\n' "$label" "$candidate"
                return 0
              fi
            done
            printf '[missing] %s\n' "$label"
            missing=1
          }

          echo 'Pentest command smoke test'
          echo

          check nmap
          check autorecon
          check ffuf
          check feroxbuster
          check gobuster
          check searchsploit
          check netexec
          check evil-winrm
          check ldapsearch
          check smbclient
          check hydra
          check john
          check hashcat
          check socat
          check proxychains4
          check tmux
          check direnv
          check new-target
          check scan
          check parse-ports
          check payload-server
          check refresh-payloads
          check responder
          check remmina
          check_any penelope penelope penelope.py
          check_any GetNPUsers GetNPUsers.py impacket-GetNPUsers
          check_any secretsdump secretsdump.py impacket-secretsdump
          check_any psexec psexec.py impacket-psexec

          echo
          if [ "$missing" -eq 0 ]; then
            echo '[+] Pentest tooling baseline looks ready.'
          else
            echo '[!] Some tools are missing. Install them before relying on this machine for timed practice.'
          fi

          exit "$missing"

    - name: Run pentest command smoke test
      command: "{{ local_bin_dir }}/pentest-check"
      register: pentest_check
      changed_when: false
      failed_when: false

    - name: Show pentest command smoke test output
      debug:
        var: pentest_check.stdout_lines
